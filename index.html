<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" id="favicon-16" href="/images/favicon-dark.png?v=4" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=4" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>think thing thank CRAFT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <!-- 초기 테마 설정 스크립트 - 깜빡임 방지 -->
    <script>
      (function() {
        const THEME_STORAGE_KEY = 'app-theme-config';
        try {
          const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
          if (savedTheme) {
            const theme = JSON.parse(savedTheme);
            // 즉시 body에 클래스 추가
            document.documentElement.classList.add(`theme-${theme.mode}-${theme.color}`);
            // 기본 스타일 적용 (가장 중요한 배경색)
            var isDarkMode = theme.mode === 'dark';
            if (isDarkMode) {
              document.documentElement.style.backgroundColor = '#000000';
              document.documentElement.style.color = '#ffffff';
            } else {
              document.documentElement.style.backgroundColor = '#ffffff';
              document.documentElement.style.color = '#111827';
            }
            // 테마별 theme-color 업데이트
            var tc = document.querySelector('meta[name="theme-color"]:not([media])');
            if (!tc) {
              tc = document.createElement('meta');
              tc.setAttribute('name', 'theme-color');
              document.head.appendChild(tc);
            }
            tc.setAttribute('content', isDarkMode ? '#09090b' : '#ffffff');
            // 테마별 favicon 전환
            var fav = document.getElementById('favicon-16');
            if (fav) fav.setAttribute('href', isDarkMode ? '/images/favicon-dark.png?v=4' : '/images/favicon-light.png?v=4');
          }
        } catch (e) {
          // 에러 무시
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
