    <!-- PWA Service Worker 등록 (prod 전용) -->
    <script>
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        window.addEventListener('load', function() {
          // 과거에 등록된 /sw.js 아닌 SW 는 정리
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) {
              var url = reg.active && reg.active.scriptURL || '';
              if (url && !url.endsWith('/sw.js')) reg.unregister();
            });
          });
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('[PWA] SW 등록 실패:', err);
          });
        });
      }
    </script>
    <!-- 초기 테마 설정 스크립트 - 깜빡임 방지 -->
    <script>
      (function() {
        const THEME_STORAGE_KEY = 'app-theme-config';
        try {
          const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
          if (savedTheme) {
            const theme = JSON.parse(savedTheme);
            // 즉시 body에 클래스 추가
            document.documentElement.classList.add(`theme-${theme.mode}-${theme.color}`);
            // 기본 스타일 적용 (가장 중요한 배경색)
            var isDarkMode = theme.mode === 'dark';
            if (isDarkMode) {
              document.documentElement.style.backgroundColor = '#000000';
              document.documentElement.style.color = '#ffffff';
            } else {
              document.documentElement.style.backgroundColor = '#ffffff';
              document.documentElement.style.color = '#111827';
            }
            // 테마별 theme-color 업데이트
            var tc = document.querySelector('meta[name="theme-color"]:not([media])');
            if (!tc) {
              tc = document.createElement('meta');
              tc.setAttribute('name', 'theme-color');
              document.head.appendChild(tc);
            }
            tc.setAttribute('content', isDarkMode ? '#09090b' : '#ffffff');
            // 테마별 favicon 전환
            var fav = document.getElementById('app-favicon');
            if (fav) fav.setAttribute('href', isDarkMode ? '/images/favicon-dark.png?v=6' : '/images/favicon-light.png?v=6');
          }
        } catch (e) {
          // 에러 무시
        }
      })();
    </script>
