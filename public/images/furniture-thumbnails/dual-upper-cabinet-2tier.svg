  <polygon fill="#A0A0A0" stroke="#7A7A7A" stroke-width="1" points="352,72 388,48 388,252 352,258"/>
  <polygon fill="#969696" stroke="#7A7A7A" stroke-width="0.7" points="352,72 352,258 359,254 359,69"/>

  <!-- 상판 -->
  <polygon fill="#D8D8D8" stroke="#7A7A7A" stroke-width="1" points="35,68 65,92 352,72 388,48 358,32 35,32"/>
  <polygon fill="#C2C2C2" stroke="#7A7A7A" stroke-width="1" points="35,32 35,68 65,92 65,56"/>
