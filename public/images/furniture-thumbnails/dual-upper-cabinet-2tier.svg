  <!-- 내부 좌벽 -->
  <polygon fill="#ACACAC" stroke="#8C8C8C" stroke-width="0.6" points="65,92 92,72 92,258 65,278"/>
  <!-- 내부 바닥면 -->
  <polygon fill="#BDBDBD" stroke="#8C8C8C" stroke-width="0.6" points="65,278 92,258 352,258 379,278"/>

  <!-- 선반 (좌측 칸) -->
  <polygon fill="#CDCDCD" stroke="#8C8C8C" stroke-width="0.6" points="65,175 92,157 222,157 222,175"/>
  <polygon fill="#BABABA" stroke="#8C8C8C" stroke-width="0.6" points="65,175 222,175 222,181 65,181"/>

  <!-- 선반 (우측 칸) -->
  <polygon fill="#CDCDCD" stroke="#8C8C8C" stroke-width="0.6" points="165,175 222,157 352,157 379,175"/>
  <polygon fill="#BABABA" stroke="#8C8C8C" stroke-width="0.6" points="165,175 379,175 379,181 165,181"/>

  <!-- 칸막이 -->
  <polygon fill="#C0C0C0" stroke="#8C8C8C" stroke-width="0.7" points="159,92 222,72 222,258 159,278"/>
  <polygon fill="#B5B5B5" stroke="#8C8C8C" stroke-width="0.5" points="159,92 159,278 165,274 165,89"/>

