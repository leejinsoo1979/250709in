<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- 상부장 2단형 - 중간 선반 1개 -->
  <!-- 우측면 -->
  <polygon points="200,100 270,70 270,320 200,350" fill="#A8A8A8" stroke="#808080" stroke-width="1.2"/>
  <!-- 전면 -->
  <polygon points="25,100 200,100 200,350 25,350" fill="#C8C8C8" stroke="#808080" stroke-width="1.2"/>
  <!-- 상판 -->
  <polygon points="25,100 200,100 270,70 95,70" fill="#DCDCDC" stroke="#808080" stroke-width="1.2"/>
  <!-- 하판 -->
  <polygon points="25,350 200,350 270,320 95,320" fill="#B0B0B0" stroke="#808080" stroke-width="0.8"/>
  <!-- 내부 상단 공간 -->
  <rect x="33" y="108" width="160" height="113" fill="#E0E0E0" stroke="#A0A0A0" stroke-width="0.5"/>
  <!-- 중간 선반 -->
  <rect x="33" y="221" width="160" height="6" fill="#B8B8B8" stroke="#909090" stroke-width="0.5"/>
  <!-- 내부 하단 공간 -->
  <rect x="33" y="227" width="160" height="115" fill="#E0E0E0" stroke="#A0A0A0" stroke-width="0.5"/>
</svg>