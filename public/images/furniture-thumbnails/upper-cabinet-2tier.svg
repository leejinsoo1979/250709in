<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <!-- upper-cabinet-2tier: 상부장 2단형 (싱글) - 선반 1개, 도어 없음 -->

  <!-- 백패널 -->
  <polygon fill="#BABABA" stroke="#909090" stroke-width="0.5"
    points="80,56 276,28 276,228 80,256"/>
  <!-- 좌측 내벽 -->
  <polygon fill="#B0B0B0" stroke="#909090" stroke-width="0.5"
    points="48,80 80,56 80,256 48,280"/>
  <!-- 바닥 내면 -->
  <polygon fill="#C5C5C5" stroke="#909090" stroke-width="0.5"
    points="48,280 80,256 276,228 244,252"/>

  <!-- 선반 1개 (중간) -->
  <polygon fill="#D0D0D0" stroke="#909090" stroke-width="0.6"
    points="48,172 80,150 276,122 244,144"/>
  <polygon fill="#BABABA" stroke="#909090" stroke-width="0.6"
    points="48,172 244,144 244,150 48,178"/>

  <!-- 우측판 -->
  <polygon fill="#9A9A9A" stroke="#757575" stroke-width="1.2"
    points="244,52 276,28 276,228 244,252"/>

  <!-- 상판 윗면 -->
  <polygon fill="#DCDCDC" stroke="#757575" stroke-width="1.2"
    points="48,80 80,56 276,28 244,52 244,44 48,44"/>
  <polygon fill="#C5C5C5" stroke="#757575" stroke-width="1"
    points="48,44 48,80 244,52 244,44"/>

  <!-- 좌측판 -->
  <polygon fill="#CCCCCC" stroke="#757575" stroke-width="1.2"
    points="40,44 48,44 48,280 40,288"/>

  <!-- 하판 -->
  <polygon fill="#C5C5C5" stroke="#757575" stroke-width="1"
    points="40,288 48,280 244,252 244,260"/>
  <polygon fill="#A8A8A8" stroke="#757575" stroke-width="0.6"
    points="40,288 244,260 276,236 276,228 244,252 48,280 40,288"/>
  <polygon fill="#949494" stroke="#757575" stroke-width="0.6"
    points="244,252 244,260 276,236 276,228"/>

  <!-- 하단 마감판 -->
  <polygon fill="#E2D9CD" stroke="#B0A090" stroke-width="1"
    points="39,296 47,288 245,260 245,268"/>
  <polygon fill="#D5CCBF" stroke="#B0A090" stroke-width="0.6"
    points="39,296 245,268 277,244 277,236 245,260 47,288 39,296"/>
  <polygon fill="#C8BFB2" stroke="#B0A090" stroke-width="0.6"
    points="245,260 245,268 277,244 277,236"/>
</svg>