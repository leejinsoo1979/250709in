<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 310" width="440" height="310">
  <!-- dual-upper-cabinet-mixed: 상부장 혼합형 듀얼 - 상단 도어 + 하단 오픈 + 칸막이 -->

  <!-- 하단 오픈 영역 내부 -->
  <polygon fill="#BABABA" stroke="#909090" stroke-width="0.5"
    points="80,136 392,100 392,200 80,236"/>
  <polygon fill="#B0B0B0" stroke="#909090" stroke-width="0.5"
    points="48,160 80,136 80,236 48,260"/>
  <polygon fill="#C5C5C5" stroke="#909090" stroke-width="0.5"
    points="48,260 80,236 392,200 360,224"/>

  <!-- 중간 선반 (상단/하단 경계) -->
  <polygon fill="#D0D0D0" stroke="#909090" stroke-width="0.7"
    points="48,158 80,136 392,100 360,122"/>
  <polygon fill="#BABABA" stroke="#909090" stroke-width="0.7"
    points="48,158 360,122 360,128 48,164"/>

  <!-- 칸막이 (하단 오픈 영역) -->
  <polygon fill="#C0C0C0" stroke="#888" stroke-width="0.8"
    points="200,160 236,136 236,218 200,242"/>
  <polygon fill="#B0B0B0" stroke="#888" stroke-width="0.5"
    points="200,160 200,242 204,240 204,158"/>

  <!-- 우측판 -->
  <polygon fill="#9A9A9A" stroke="#757575" stroke-width="1.2"
    points="360,34 392,10 392,200 360,224"/>

  <!-- 상판 -->
  <polygon fill="#DCDCDC" stroke="#757575" stroke-width="1.2"
    points="48,70 80,46 392,10 360,34 360,26 48,26"/>
  <polygon fill="#C5C5C5" stroke="#757575" stroke-width="1"
    points="48,26 48,70 360,34 360,26"/>

  <!-- 좌측판 -->
  <polygon fill="#CCCCCC" stroke="#757575" stroke-width="1.2"
    points="40,26 48,26 48,260 40,268"/>

  <!-- 상단 도어 (상반부 50%) -->
  <polygon fill="#E8E0D4" stroke="#A89880" stroke-width="1.5"
    points="48,34 360,0 360,118 48,152"/>
  <polygon fill="#F2EAE0" stroke="#A89880" stroke-width="0.8"
    points="48,30 360,-4 360,0 48,34"/>
  <polygon fill="#D5CCBF" stroke="#A89880" stroke-width="0.8"
    points="360,-4 364,-6 364,116 360,118"/>
  <!-- 도어 핸들 -->
  <line x1="350" y1="72" x2="350" y2="96" stroke="#8A8A8A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 하판 -->
  <polygon fill="#C5C5C5" stroke="#757575" stroke-width="1"
    points="40,268 48,260 360,224 360,232"/>
  <polygon fill="#A8A8A8" stroke="#757575" stroke-width="0.6"
    points="40,268 360,232 392,208 392,200 360,224 48,260 40,268"/>
  <polygon fill="#949494" stroke="#757575" stroke-width="0.6"
    points="360,224 360,232 392,208 392,200"/>

  <!-- 하단 마감판 -->
  <polygon fill="#E2D9CD" stroke="#B0A090" stroke-width="1"
    points="39,276 47,268 361,232 361,240"/>
  <polygon fill="#D5CCBF" stroke="#B0A090" stroke-width="0.6"
    points="39,276 361,240 393,216 393,208 361,232 47,268 39,276"/>
  <polygon fill="#C8BFB2" stroke="#B0A090" stroke-width="0.6"
    points="361,232 361,240 393,216 393,208"/>
</svg>